    html, body, #root { margin: 0; height: 100%; }

      font-family: 'Manrope', 'Noto Sans TC', system-ui, sans-serif;
      background: #f0eee9;
      color: #2a221c;
    }
    /* Stack the CJK fallback after the latin font on the .serif class so 
       Chinese still gets a serif glyph (Noto Serif TC) while Latin uses Newsreader. */
    .serif {
      font-family: var(--font-serif), 'Noto Serif TC', serif !important;
    }
    .jyu {
      font-family: 'Manrope', 'Noto Sans TC', system-ui, sans-serif;
    }
